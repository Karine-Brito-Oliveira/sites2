<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Animes</title>

    <!-- Conexão com o CSS externo -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===== TÍTULO PRINCIPAL ===== -->
    <header>
        <h1>MEUS ANIMES</h1>
    </header>

    <!-- ===== BANNER ROTATIVO ===== -->
    <section class="banner">
        <div class="slides">
            <div class="slide slide1">
                <h2>ONE PUNCH MAN</h2>
            </div>
            <div class="slide slide2">
                <h2>ONE PIECE</h2>
            </div>
        </div>
    </section>

    <!-- ===== SEÇÃO PRINCIPAL - CARDS ===== -->
    <section class="cards">

        <div class="card">
            <h3>Luffy</h3>
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTB_UXtir-tMq99LbRpQNTubu5gJWwRWmEPSA&s" alt="Luffy">
        </div>

        <div class="card">
            <h3>Saitama</h3>
            <img src="https://upload.wikimedia.org/wikipedia/pt/3/37/Saitama_One_Punch-Man.png" alt="Saitama">
        </div>

    </section>

    <!-- ===== TABELA ===== -->
    <section class="tabela">
        <table>
            <tr>
                <th>ANIME</th>
                <th>Ano do Anime 2009</th>
                <th>Ano do Anime 1999</th>
            </tr>
            <tr>
                <td>One Punch Man</td>
                <td>2009</td>
                <td>-</td>
            </tr>
            <tr>
                <td>One Piece</td>
                <td>-</td>
                <td>1999</td>
            </tr>
            <tr>
                <td>Luffy</td>
                <td>-</td>
                <td>1999</td>
            </tr>
            <tr>
                <td>Saitama</td>
                <td>2009</td>
                <td>-</td>
            </tr>
        </table>
    </section>

    <!-- ===== RODAPÉ ===== -->
    <footer>
        <p><strong>Karine Brito</strong></p>
        <p>Telefone: 62 9438-9649</p>
        <p>Email: karineebrito508@gmail.com</p>
    </footer>

</body>
</html>
